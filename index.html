<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alexandra & Alexandru</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- SIGILIU -->
<div class="overlay" onclick="openInvite()">
  <div class="seal-container">
    <div class="wax-seal">
      <span>A&A</span>
    </div>
    <p>Deschide invitația</p>
  </div>
</div>

<!-- CONTINUT -->
<div id="content" class="hidden">
  <div class="veil">

    <h1 class="names">Alexandra & Alexandru</h1>
    <p class="subtitle">Păun-Stoica</p>

    <p class="text">
      Vă invităm să fiți alături de noi într-una dintre cele mai importante zile ale vieții noastre
    </p>

    <h2 class="date">11 Septembrie 2027</h2>

    <div id="countdown" class="countdown"></div>

    <!-- CEREMONIE -->
    <div class="event">
      <h3>Ceremonia religioasă</h3>
      <p>Ora 16:00</p>

      <iframe 
        src="https://maps.google.com/maps?q=t4FAhu7SqMm7ARCG9&output=embed">
      </iframe>
    </div>

    <!-- PETRECERE -->
    <div class="event">
      <h3>Petrecerea</h3>
      <p>Ora 18:30</p>

      <iframe 
        src="https://maps.google.com/maps?q=5PUygjoMzNtHvifR6&output=embed">
      </iframe>
    </div>

    <!-- RSVP -->
    <div class="section">
      <h3>Confirmare prezență</h3>

      <form id="rsvpForm">
        <input type="text" name="name" placeholder="Nume" required>
        <input type="number" name="guests" placeholder="Număr persoane" required>

        <select name="status" required>
          <option value="">Selectează</option>
          <option value="Confirm">Confirm</option>
          <option value="Nu pot veni">Nu pot veni</option>
        </select>

        <button type="submit">Trimite</button>
      </form>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
